name: Ensure promotion PR
on:
  push:
    branches: [dev]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: promotion-${{ github.repository }}
  cancel-in-progress: false
jobs:
  ensure:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure one dev to main PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ahead="$(gh api "repos/${GITHUB_REPOSITORY}/compare/main...dev" --jq '.ahead_by')"
          test "$ahead" -gt 0 || exit 0
          existing="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')"
          test -n "$existing" || gh pr create --base main --head dev --title 'chore: promote dev to main' --body 'Idempotent promotion proposal; merge remains review-gated.'
