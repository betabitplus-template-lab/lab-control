name: Direct quality and packaging
on:
  workflow_call:
    inputs:
      import-name:
        required: true
        type: string
      console-script:
        required: false
        type: string
        default: ""
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with: {python-version: "3.13"}
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run lint-imports
      - run: uv run flake8 --select=CCR --max-cognitive-complexity=15 src
      - run: uv run flake8 --select=CCE --class-attributes-order=field,nested_class,magic_method,property_method,static_method,class_method,method src
      - name: Radon CC — preserve existing fail-on-output semantics
        run: |
          output="$(uv run radon cc --min C --show-complexity src)"
          printf '%s\n' "$output"
          test -z "$output"
      - name: Radon MI — preserve existing fail-on-output semantics
        run: |
          output="$(uv run radon mi --min B --show src)"
          printf '%s\n' "$output"
          test -z "$output"
      - name: Audit runtime dependencies only
        run: |
          uv export --frozen --format requirements-txt --no-hashes --no-dev --no-header --no-annotate --no-emit-workspace > "$RUNNER_TEMP/runtime.txt"
          uv run pip-audit --no-deps --disable-pip --requirement "$RUNNER_TEMP/runtime.txt"
      - run: python experiments/minimal-policy/py_lib_policy.py .
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with: {python-version: "3.13"}
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      - run: uv sync --frozen --all-groups
      - run: uv build
      - run: uv run twine check dist/*
      - run: uv run check-wheel-contents dist/*.whl
      - run: uv run check-manifest
      - name: Isolated wheel and sdist smoke
        env:
          IMPORT_NAME: ${{ inputs.import-name }}
          CONSOLE_SCRIPT: ${{ inputs.console-script }}
        run: |
          for artifact in dist/*.whl dist/*.tar.gz; do
            name="$(basename "$artifact" | tr '.-' '__')"
            venv="$RUNNER_TEMP/$name"
            uv venv "$venv"
            uv pip install --python "$venv/bin/python" "$artifact"
            [[ "$IMPORT_NAME" =~ ^[a-zA-Z_][a-zA-Z0-9_.]*$ ]]
            [[ -z "$CONSOLE_SCRIPT" || "$CONSOLE_SCRIPT" =~ ^[a-zA-Z0-9_.-]+$ ]]
            IMPORT_NAME="$IMPORT_NAME" "$venv/bin/python" - <<'PY'
            import importlib
            import os
            importlib.import_module(os.environ["IMPORT_NAME"])
            PY
            if test -n "$CONSOLE_SCRIPT"; then "$venv/bin/$CONSOLE_SCRIPT" --help >/dev/null; fi
          done
      - run: uv run pytest -q
