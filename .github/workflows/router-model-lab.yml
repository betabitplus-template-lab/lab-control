name: Router model lab

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.1
        with:
          persist-credentials: false
      - name: Validate deterministic fleet shards
        run: |
          set -euo pipefail
          python3 experiments/renovate_shard_model.py
          git diff --exit-code -- evidence/renovate-shards.json
          jq -e '.scenarios | length == 2 and all(.matrix_under_256 and .token_scope_under_500 and .stable_across_input_order)' \
            evidence/renovate-shards.json >/dev/null
