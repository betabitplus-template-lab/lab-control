name: Release lab templates
on:
  push:
    branches: [main]
    paths:
      - release/request.json
  pull_request:
    paths:
      - release/request.json
      - release/release.py
      - .github/workflows/release-lab.yml
  workflow_dispatch:
concurrency:
  group: release-lab-${{ github.repository }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  release:
    name: Release exact-SHA lab templates
    runs-on: ubuntu-latest
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@def152b8a737443d7af6c5722c6389146fe90c90
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            components
            python-lib
            python-internal-package
            python-starter-platform
            lab-control
          permission-contents: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Create only exact-SHA tags
        id: release
        continue-on-error: true
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set +e
          set -o pipefail
          python release/release.py 2>&1 | tee /tmp/release.log
          status=${PIPESTATUS[0]}
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Assemble release evidence
        if: always()
        env:
          OUTCOME: ${{ steps.release.outcome }}
          EXIT_STATUS: ${{ steps.release.outputs.status }}
        shell: bash
        run: |
          mkdir -p /tmp/release-evidence
          if [ -f docs/results/release.json ]; then
            cp docs/results/release.json /tmp/release-evidence/release.json
          else
            printf '{"releases": []}\n' > /tmp/release-evidence/release.json
          fi
          if [ -f /tmp/release.log ]; then
            tail -n 200 /tmp/release.log | sed -E 's/(x-access-token:)[^@[:space:]]+@/\1<redacted>@/g; s/ghs_[A-Za-z0-9_]+/<redacted>/g' > /tmp/release-evidence/release.log
          fi
          printf '{"outcome": "%s", "exit_status": "%s", "run_id": "%s", "sha": "%s"}\n' "$OUTCOME" "$EXIT_STATUS" "$GITHUB_RUN_ID" "$GITHUB_SHA" > /tmp/release-evidence/release-status.json
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-evidence
          path: /tmp/release-evidence
          if-no-files-found: error
      - name: Persist release evidence to main
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          askpass="$RUNNER_TEMP/git-askpass.sh"
          cat > "$askpass" <<'SH'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) printf '%s\n' "$GH_TOKEN" ;;
          esac
          SH
          chmod 700 "$askpass"
          export GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0
          trap 'rm -f "$askpass"' EXIT
          success=false
          for attempt in 1 2 3 4; do
            git fetch origin main
            git checkout -B evidence-main origin/main
            mkdir -p docs/results
            cp /tmp/release-evidence/* docs/results/
            git add docs/results/release.json docs/results/release.log docs/results/release-status.json
            if git diff --cached --quiet; then
              success=true
              break
            fi
            git config user.name "Template Lab Release Controller"
            git config user.email "8123085+betabitplus@users.noreply.github.com"
            git commit -m "docs: record lab template releases"
            if git push origin HEAD:main; then
              success=true
              break
            fi
            sleep $((attempt * 2))
          done
          test "$success" = true
      - name: Enforce release result
        if: always()
        env:
          OUTCOME: ${{ steps.release.outcome }}
        run: test "$OUTCOME" = success
