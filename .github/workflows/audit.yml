name: Audit isolated lab
on:
  push:
    branches: [main]
    paths:
      - audit/audit.py
      - .github/workflows/audit.yml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Audit only the eight allowlisted lab repositories
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python audit/audit.py
      - name: Persist audit evidence
        run: |
          git pull --rebase origin main
          git add docs/results/repository-audit.json
          if ! git diff --cached --quiet; then
            git config user.name "Template Lab Auditor"
            git config user.email "8123085+betabitplus@users.noreply.github.com"
            git commit -m "docs: record isolated repository audit"
            git push origin main
          fi
