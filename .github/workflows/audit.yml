name: Audit isolated lab
on:
  push:
    branches: [main]
    paths:
      - audit/audit.py
      - .github/workflows/audit.yml
  workflow_dispatch:
concurrency:
  group: audit-${{ github.repository }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  audit:
    name: Audit allowlisted repositories
    runs-on: ubuntu-latest
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@def152b8a737443d7af6c5722c6389146fe90c90
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            components
            python-lib
            python-internal-package
            python-starter-platform
            sandbox-python-lib
            sandbox-python-platform
            sandbox-workspace
            lab-control
          permission-contents: write
          permission-issues: read
          permission-pull-requests: read
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Audit only the eight allowlisted lab repositories
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python audit/audit.py
      - name: Persist audit evidence
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          askpass="$RUNNER_TEMP/git-askpass.sh"
          cat > "$askpass" <<'SH'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) printf '%s\n' "$GH_TOKEN" ;;
          esac
          SH
          chmod 700 "$askpass"
          export GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0
          trap 'rm -f "$askpass"' EXIT
          git pull --rebase origin main
          git add docs/results/repository-audit.json
          if ! git diff --cached --quiet; then
            git config user.name "Template Lab Auditor"
            git config user.email "8123085+betabitplus@users.noreply.github.com"
            git commit -m "docs: record isolated repository audit"
            git push origin main
          fi
