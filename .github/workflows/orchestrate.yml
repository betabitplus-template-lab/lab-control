name: Finalize template pilot preparation
on:
  push:
    branches: [main]
    paths:
      - orchestration/finalize.py
      - orchestration/pilot.py
      - orchestration/pilot_runner.py
      - orchestration/pilot_runner_v2.py
      - .github/workflows/orchestrate.yml
  pull_request:
    paths:
      - orchestration/finalize.py
      - orchestration/pilot.py
      - orchestration/pilot_runner.py
      - orchestration/pilot_runner_v2.py
      - .github/workflows/orchestrate.yml
  workflow_dispatch:
concurrency:
  group: template-pilot-preparation
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pinned pilot tools
        run: python -m pip install "copier==9.16.0" "PyYAML==6.0.3"
      - name: Finalize preparation and persist diagnostics
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set +e
          set -o pipefail
          python orchestration/finalize.py 2>&1 | tee /tmp/orchestrate.log
          status=${PIPESTATUS[0]}
          set -e
          mkdir -p /tmp/pilot-evidence
          tail -n 250 /tmp/orchestrate.log | sed -E 's/(x-access-token:)[^@[:space:]]+@/\1<redacted>@/g; s/ghs_[A-Za-z0-9_]+/<redacted>/g' > /tmp/pilot-evidence/orchestrate.log
          printf '{"status": %s, "run_id": "%s", "sha": "%s"}\n' "$status" "$GITHUB_RUN_ID" "$GITHUB_SHA" > /tmp/pilot-evidence/orchestrate-status.json
          [ ! -f docs/results/prepare.json ] || cp docs/results/prepare.json /tmp/pilot-evidence/prepare.json
          [ ! -f docs/results/prepare.md ] || cp docs/results/prepare.md /tmp/pilot-evidence/prepare.md
          git fetch origin main
          git checkout -B evidence-main origin/main
          mkdir -p docs/results
          cp /tmp/pilot-evidence/* docs/results/
          git add docs/results/orchestrate.log docs/results/orchestrate-status.json docs/results/prepare.json docs/results/prepare.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "Template Lab Orchestrator"
            git config user.email "8123085+betabitplus@users.noreply.github.com"
            git commit -m "docs: record finalized pilot preparation"
            git push origin HEAD:main
          fi
          exit "$status"
