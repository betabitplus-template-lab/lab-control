name: Orchestrate template pilot
on:
  push:
    branches: [main]
    paths:
      - orchestration/pilot.py
      - orchestration/pilot_runner.py
      - orchestration/pilot_runner_v2.py
      - orchestration/request.json
      - .github/workflows/orchestrate.yml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pinned pilot tools
        run: python -m pip install "copier==9.16.0" "PyYAML==6.0.3"
      - name: Execute guarded pilot phase and persist diagnostics
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set +e
          set -o pipefail
          python orchestration/pilot_runner_v2.py 2>&1 | tee /tmp/orchestrate.log
          status=${PIPESTATUS[0]}
          set -e
          git pull --rebase origin main
          mkdir -p docs/results
          sed -E 's/(x-access-token:)[^@[:space:]]+@/\1<redacted>@/g; s/ghs_[A-Za-z0-9_]+/<redacted>/g' /tmp/orchestrate.log > docs/results/orchestrate.log
          printf '{"status": %s, "run_id": "%s", "sha": "%s"}\n' "$status" "$GITHUB_RUN_ID" "$GITHUB_SHA" > docs/results/orchestrate-status.json
          git add docs/results/orchestrate.log docs/results/orchestrate-status.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record orchestrator diagnostics"
            git push origin main
          fi
          exit "$status"
