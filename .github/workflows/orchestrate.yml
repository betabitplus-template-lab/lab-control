name: Orchestrate template pilot
on:
  push:
    branches: [main]
    paths:
      - orchestration/pilot.py
      - orchestration/request.json
      - .github/workflows/orchestrate.yml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pinned pilot tools
        run: python -m pip install "copier==9.16.0" "PyYAML==6.0.3"
      - name: Execute guarded pilot phase
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python orchestration/pilot.py
