name: Renovate lab
on:
  push:
    branches: [main]
    paths:
      - renovate/config.js
      - renovate/request.json
      - .github/workflows/run-renovate.yml
  pull_request:
    paths:
      - renovate/config.js
      - renovate/request.json
      - .github/workflows/run-renovate.yml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Mint Renovate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Validate guarded request
        run: node -e 'require("./renovate/config.js")'
      - name: Run pinned Renovate container
        id: renovate
        continue-on-error: true
        shell: bash
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set +e
          set -o pipefail
          docker run --rm \
            -v "$PWD:/usr/src/app" \
            -w /usr/src/app \
            -e RENOVATE_TOKEN \
            -e RENOVATE_CONFIG_FILE=renovate/config.js \
            -e LOG_LEVEL=debug \
            renovate/renovate:43.262.4 2>&1 | tee /tmp/renovate.log
          status=${PIPESTATUS[0]}
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Persist run result
        if: always()
        shell: bash
        env:
          OUTCOME: ${{ steps.renovate.outcome }}
          EXIT_STATUS: ${{ steps.renovate.outputs.status }}
        run: |
          mkdir -p /tmp/renovate-evidence
          cp renovate/request.json /tmp/renovate-evidence/renovate-request.json
          if [ -f /tmp/renovate.log ]; then
            tail -n 300 /tmp/renovate.log | sed -E 's/(x-access-token:)[^@[:space:]]+@/\1<redacted>@/g; s/ghs_[A-Za-z0-9_]+/<redacted>/g' > /tmp/renovate-evidence/renovate.log
          else
            printf 'Renovate did not create a host log.\n' > /tmp/renovate-evidence/renovate.log
          fi
          printf '{"outcome": "%s", "exit_status": "%s", "run_id": "%s", "sha": "%s"}\n' "$OUTCOME" "$EXIT_STATUS" "$GITHUB_RUN_ID" "$GITHUB_SHA" > /tmp/renovate-evidence/renovate-status.json
          success=false
          for attempt in 1 2 3 4; do
            git fetch origin main
            git checkout -B renovate-evidence origin/main
            mkdir -p docs/results
            cp /tmp/renovate-evidence/* docs/results/
            git add docs/results/renovate-request.json docs/results/renovate-status.json docs/results/renovate.log
            if git diff --cached --quiet; then
              success=true
              break
            fi
            git config user.name "Template Lab Renovate Controller"
            git config user.email "8123085+betabitplus@users.noreply.github.com"
            git commit -m "ci: record Renovate run result"
            if git push origin HEAD:main; then
              success=true
              break
            fi
            sleep $((attempt * 2))
          done
          test "$success" = true
          test "$OUTCOME" = success
