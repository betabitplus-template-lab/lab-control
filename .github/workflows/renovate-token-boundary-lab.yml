name: Renovate token boundary lab

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Mint one-repository shard token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: sandbox-renovate-shard-01
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Prove out-of-shard denial
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          mapfile -t token_repositories < <(gh api installation/repositories --paginate --jq '.repositories[].full_name')
          test "${#token_repositories[@]}" -eq 1
          test "${token_repositories[0]}" = betabitplus-template-lab/sandbox-renovate-shard-01

          probe_ref="token-boundary-${GITHUB_RUN_ID}"
          in_shard_sha="$(gh api repos/betabitplus-template-lab/sandbox-renovate-shard-01/git/ref/heads/main --jq .object.sha)"
          gh api --method POST repos/betabitplus-template-lab/sandbox-renovate-shard-01/git/refs \
            -f ref="refs/heads/${probe_ref}" -f sha="$in_shard_sha" --silent
          gh api --method DELETE "repos/betabitplus-template-lab/sandbox-renovate-shard-01/git/refs/heads/${probe_ref}" --silent

          out_of_shard_sha="$(gh api repos/betabitplus-template-lab/sandbox-renovate-shard-02/git/ref/heads/main --jq .object.sha)"
          set +e
          gh api --method POST repos/betabitplus-template-lab/sandbox-renovate-shard-02/git/refs \
            -f ref="refs/heads/${probe_ref}" -f sha="$out_of_shard_sha" --silent
          out_of_shard=$?
          set -e
          test "$out_of_shard" -ne 0
          printf 'in_shard_contents_write=success out_of_shard_contents_write=denied\n' >> "$GITHUB_STEP_SUMMARY"
