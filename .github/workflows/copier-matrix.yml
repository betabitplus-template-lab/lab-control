name: Copier update matrix
on:
  push:
    branches: [main]
    paths:
      - acceptance/copier_matrix.py
      - .github/workflows/copier-matrix.yml
  pull_request:
    paths:
      - acceptance/copier_matrix.py
      - .github/workflows/copier-matrix.yml
  workflow_dispatch:
concurrency:
  group: copier-matrix-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  matrix:
    name: Copier matrix / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Mint isolated lab token
        id: app-token
        uses: actions/create-github-app-token@def152b8a737443d7af6c5722c6389146fe90c90
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            components
            python-lib
            python-internal-package
            python-starter-platform
            sandbox-python-lib
            sandbox-python-platform
            sandbox-workspace
            lab-control
          permission-contents: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Install pinned Copier
        run: python -m pip install "copier==9.16.0"
      - name: Run matrix
        id: matrix-run
        continue-on-error: true
        shell: bash
        run: |
          set +e
          set -o pipefail
          python acceptance/copier_matrix.py 2>&1 | tee /tmp/copier-matrix.log
          status=${PIPESTATUS[0]}
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Persist result from Linux lane
        if: always() && matrix.os == 'ubuntu-latest'
        env:
          OUTCOME: ${{ steps.matrix-run.outcome }}
          EXIT_STATUS: ${{ steps.matrix-run.outputs.status }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          askpass="$RUNNER_TEMP/git-askpass.sh"
          cat > "$askpass" <<'SH'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) printf '%s\n' "$GH_TOKEN" ;;
          esac
          SH
          chmod 700 "$askpass"
          export GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0
          trap 'rm -f "$askpass"' EXIT
          mkdir -p /tmp/matrix-evidence
          if [ -f /tmp/copier-matrix.log ]; then
            tail -n 250 /tmp/copier-matrix.log > /tmp/matrix-evidence/copier-matrix.log
          fi
          if [ -f docs/results/copier-matrix.json ]; then
            cp docs/results/copier-matrix.json /tmp/matrix-evidence/copier-matrix.json
          else
            printf '{"failures": ["matrix did not produce result JSON"]}\n' > /tmp/matrix-evidence/copier-matrix.json
          fi
          printf '{"outcome": "%s", "exit_status": "%s", "run_id": "%s", "sha": "%s"}\n' "$OUTCOME" "$EXIT_STATUS" "$GITHUB_RUN_ID" "$GITHUB_SHA" > /tmp/matrix-evidence/copier-matrix-status.json
          git fetch origin main
          git checkout -B evidence-main origin/main
          mkdir -p docs/results
          cp /tmp/matrix-evidence/* docs/results/
          git add docs/results/copier-matrix.json docs/results/copier-matrix.log docs/results/copier-matrix-status.json
          if ! git diff --cached --quiet; then
            git config user.name "Template Lab Acceptance"
            git config user.email "8123085+betabitplus@users.noreply.github.com"
            git commit -m "docs: record Copier update matrix"
            git push origin HEAD:main
          fi
          test "$OUTCOME" = success
      - name: Enforce macOS result
        if: always() && matrix.os == 'macos-latest'
        env:
          OUTCOME: ${{ steps.matrix-run.outcome }}
        run: test "$OUTCOME" = success
